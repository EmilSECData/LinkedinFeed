document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

lor:var(--text);white-space:pre-line;text-wrap:pretty;width:100%;align-self:flex-start;\">{{ cur.text }}<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"margin-top:clamp(18px,2.4vmin,32px);color:var(--accent);font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:clamp(13px,1.6vmin,22px);flex:0 0 auto;\">{{ cur.tagsLine }}<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"position:relative;overflow:hidden;border-radius:clamp(12px,1.6vmin,22px);border:1px solid var(--line);background:var(--bg2);\">\n      <div style=\"position:absolute;inset:0;padding:clamp(14px,2vmin,28px);\">\n        <div style=\"display:flex;flex-direction:column;gap:clamp(12px,1.6vmin,22px);animation:scrollUp 26s linear infinite;will-change:transform;\">\n          <sc-for list=\"{{ tickerList }}\" as=\"p\" hint-placeholder-count=\"6\">\n            <div style=\"flex:0 0 auto;border-bottom:1px solid var(--line);padding-bottom:clamp(12px,1.6vmin,22px);\">\n              <div style=\"color:var(--muted);font-size:clamp(10px,1.2vmin,16px);font-weight:500;margin-bottom:.4em;\">{{ p.dateLabel }}<\u002Fdiv>\n              <p style=\"margin:0;font-size:clamp(13px,1.55vmin,22px);line-height:1.38;color:var(--text);white-space:pre-line;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;\">{{ p.text }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:absolute;left:0;right:0;bottom:0;height:64px;background:linear-gradient(transparent,var(--bg2));pointer-events:none;\"><\u002Fdiv>\n      <div style=\"position:absolute;left:0;right:0;top:0;height:48px;background:linear-gradient(var(--bg2),transparent);pointer-events:none;\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fmain>\n  <\u002Fsc-if>\n\n  <footer style=\"display:flex;align-items:center;justify-content:space-between;gap:24px;padding:clamp(14px,2vmin,30px) clamp(26px,4vmin,60px);border-top:1px solid var(--line);flex:0 0 auto;\">\n    <div style=\"display:flex;align-items:center;gap:clamp(7px,1vmin,12px);\">\n      <sc-for list=\"{{ dots }}\" as=\"d\" hint-placeholder-count=\"5\">\n        <span style=\"{{ d.style }}\"><\u002Fspan>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:clamp(12px,1.8vmin,24px);\">\n      <div style=\"text-align:right;line-height:1.25;\">\n        <div style=\"color:var(--text);font-weight:600;font-family:'Space Grotesk',sans-serif;font-size:clamp(13px,1.7vmin,24px);\">Følg oss på LinkedIn<\u002Fdiv>\n        <div style=\"color:var(--muted);font-size:clamp(11px,1.4vmin,18px);margin-top:.3em;\">Skann QR-koden →<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff;padding:clamp(5px,.7vmin,11px);border-radius:clamp(8px,1vmin,14px);width:clamp(62px,8.5vmin,120px);height:clamp(62px,8.5vmin,120px);display:flex;align-items:center;justify-content:center;flex:0 0 auto;\">\n        {{ qrImg }}\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 1280, &quot;height&quot;: 720 },\n  &quot;layout&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;spotlight&quot;, &quot;grid&quot;, &quot;ticker&quot;], &quot;default&quot;: &quot;spotlight&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;rotationSeconds&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 10, &quot;min&quot;: 4, &quot;max&quot;: 60, &quot;tsType&quot;: &quot;number&quot; },\n  &quot;accent&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#2BC8DE&quot;, &quot;options&quot;: [&quot;#2BC8DE&quot;, &quot;#3B82F6&quot;, &quot;#22C39A&quot;, &quot;#F59E0B&quot;], &quot;tsType&quot;: &quot;string&quot; }\n}\">\nclass Component extends DCLogic {\n  state = { posts: [], index: 0, timeStr: \"\", dateStr: \"\",\n    page: { name: \"SEC DATACOM – Team AV\", url: \"https://www.linkedin.com/company/secdatacom-team-av/\" } };\n\n  config = { feedUrl: \"https://rss.app/feeds/gm58jT6Wao727fWJ.xml\", corsProxy: \"\", refreshMinutes: 10, maxPosts: 12 };\n\n  DEFAULTS = [\n    { author:\"Team AV\", role:\"SEC DATACOM\", date:\"2026-06-24\", text:\"Vi er på plass på Integrate Roadshow 2026! Stikk innom standen vår for å oppleve de nyeste løsningene for hybride møterom, auditorier og digital signage.\", image:\"\", tags:[\"#TeamAV\",\"#Roadshow2026\"] },\n    { author:\"Team AV\", role:\"SEC DATACOM\", date:\"2026-06-18\", text:\"Nyhet i porteføljen: neste generasjons videokonferanse for det moderne møterommet. Skarpere bilde, smartere kamerastyring og enklere oppsett.\", image:\"\", tags:[\"#Videokonferanse\",\"#Nyhet\"] },\n    { author:\"Team AV\", role:\"SEC DATACOM\", date:\"2026-06-11\", text:\"Webinar: Slik bygger du fremtidens møterom. Bli med når ekspertene våre går gjennom design, teknologivalg og fallgruver – og svarer live.\", image:\"\", tags:[\"#Webinar\"] },\n    { author:\"Team AV\", role:\"SEC DATACOM\", date:\"2026-06-03\", text:\"Tusen takk til alle som besøkte oss på AV-dagen i Oslo! Fantastiske samtaler, gode demoer og masse inspirasjon.\", image:\"\", tags:[\"#AVdagen\",\"#Oslo\"] },\n  ];\n\n  componentDidMount() {\n    this.applyAccent();\n    this.tickClock();\n    this.clockTimer = setInterval(() => this.tickClock(), 1000);\n    this.makeQR();\n    this._onResize = () => this.scheduleFit();\n    window.addEventListener(\"resize\", this._onResize);\n    this.boot();\n  }\n\n  // Lag QR-kode lokalt (peker til LinkedIn-siden) – ingen ekstern tjeneste\n  makeQR() {\n    try {\n      if (typeof qrcode === \"undefined\") { this.qrRetry = (this.qrRetry || 0) + 1; if (this.qrRetry < 40) setTimeout(() => this.makeQR(), 250); return; }\n      const url = (this.state.page && this.state.page.url) || \"https://www.linkedin.com/company/secdatacom-team-av/\";\n      if (url === this.qrUrl && this.state.qrDataUrl) return;\n      const qr = qrcode(0, \"M\");\n      qr.addData(url);\n      qr.make();\n      this.qrUrl = url;\n      this.setState({ qrDataUrl: qr.createDataURL(10, 1) });\n    } catch (e) {}\n  }\n  componentDidUpdate(prev) {\n    if (prev.layout !== this.props.layout || prev.rotationSeconds !== this.props.rotationSeconds) this.startRotation();\n    this.applyAccent();\n    this.scheduleFit();\n  }\n  componentWillUnmount() {\n    clearInterval(this.clockTimer); clearInterval(this.rotTimer); clearInterval(this.feedTimer);\n    cancelAnimationFrame(this._fitRaf);\n    if (this._onResize) window.removeEventListener(\"resize\", this._onResize);\n  }\n\n  // Skaler brødteksten så HELE innlegget får plass uten å kuttes\n  scheduleFit() {\n    cancelAnimationFrame(this._fitRaf);\n    this._fitRaf = requestAnimationFrame(() => requestAnimationFrame(() => this.fitAll()));\n  }\n  fitAll() {\n    document.querySelectorAll('[data-fit=\"1\"]').forEach(el => this.fitText(el));\n  }\n  fitText(p) {\n    const wrap = p.parentElement;\n    if (!wrap) return;\n    const avail = wrap.clientHeight;\n    if (!avail) return;\n    const cap = Math.round(Math.min(window.innerWidth, window.innerHeight) * 0.036);\n    let lo = 13, hi = Math.max(16, Math.min(40, cap)), best = lo;\n    while (lo <= hi) {\n      const mid = (lo + hi) >> 1;\n      p.style.fontSize = mid + \"px\";\n      if (p.scrollHeight <= wrap.clientHeight + 1) { best = mid; lo = mid + 1; }\n      else hi = mid - 1;\n    }\n    p.style.fontSize = best + \"px\";\n  }\n\n  // ---- Oppstart: les config, last innhold, start auto-oppdatering ----\n  async boot() {\n    try {\n      const r = await fetch(\"config.json\", { cache: \"no-store\" });\n      if (r.ok) {\n        const c = await r.json();\n        this.config = { ...this.config, ...c };\n        if (c.page) this.setState(s => ({ page: { ...s.page, ...c.page } }), () => this.makeQR());\n      }\n    } catch (e) {}\n\n    await this.loadContent();\n    this.startRotation();\n\n    const mins = Math.max(2, Number(this.config.refreshMinutes) || 10);\n    clearInterval(this.feedTimer);\n    this.feedTimer = setInterval(() => this.loadContent(), mins * 60 * 1000);\n  }\n\n  // ---- Velg kilde: feed hvis satt, ellers posts.json ----\n  async loadContent() {\n    if (this.config.feedUrl && String(this.config.feedUrl).trim()) {\n      try {\n        const posts = await this.fetchFeed(this.config.feedUrl.trim());\n        if (posts && posts.length) { this.setState({ posts: this.limit(posts) }); return; }\n        console.warn(\"[Infoskjerm] Feed ga ingen innlegg – bruker posts.json som reserve.\");\n      } catch (e) {\n        console.warn(\"[Infoskjerm] Klarte ikke hente feed (\" + (e && e.message) + \") – bruker posts.json som reserve.\");\n      }\n    }\n    try {\n      const r = await fetch(\"posts.json\", { cache: \"no-store\" });\n      if (!r.ok) return;\n      const d = await r.json();\n      const next = {};\n      if (d && Array.isArray(d.posts) && d.posts.length) next.posts = d.posts.map(p => this.normalize(p));\n      if (d && d.page) next.page = { ...this.state.page, ...d.page };\n      if (Object.keys(next).length) this.setState(next);\n    } catch (e) {}\n  }\n\n  limit(arr) {\n    const m = Math.max(1, Number(this.config.maxPosts) || 12);\n    return arr.slice(0, m);\n  }\n\n  // ---- Hent + tolk feed (JSON-feed eller RSS/Atom-XML) ----\n  async fetchFeed(url) {\n    const tries = [];\n    if (this.config.corsProxy) tries.push(this.config.corsProxy + encodeURIComponent(url));\n    tries.push(url);\n    if (!this.config.corsProxy) tries.push(\"https://corsproxy.io/?url=\" + encodeURIComponent(url));\n\n    let lastErr;\n    for (const u of tries) {\n      try {\n        const r = await fetch(u, { cache: \"no-store\" });\n        if (!r.ok) { lastErr = new Error(\"HTTP \" + r.status); continue; }\n        const raw = await r.text();\n        const trimmed = raw.trim();\n        if (trimmed.startsWith(\"{\") || trimmed.startsWith(\"[\")) return this.parseJsonFeed(JSON.parse(trimmed));\n        return this.parseXmlFeed(trimmed);\n      } catch (e) { lastErr = e; }\n    }\n    throw lastErr || new Error(\"ingen respons\");\n  }\n\n  parseJsonFeed(data) {\n    const items = Array.isArray(data) ? data : (data.items || data.posts || data.entries || []);\n    return items.map(it => this.normalize({\n      author: (it.author && (it.author.name || it.author)) || (data.title) || \"Team AV\",\n      date: it.date_published || it.published || it.pubDate || it.date || it.updated,\n      text: this.clean(it.content_text || it.contentSnippet || it.summary || it.description || it.content_html || it.content || it.title),\n      image: it.image || it.banner_image || it.thumbnail || this.imgFrom(it.content_html || it.content || it.description),\n      url: it.url || it.link\n    }));\n  }\n\n  parseXmlFeed(text) {\n    const doc = new DOMParser().parseFromString(text, \"application/xml\");\n    const nodes = [...doc.querySelectorAll(\"item, entry\")];\n    const tag = (el, names) => {\n      for (const n of names) {\n        const m = el.getElementsByTagName(n);\n        if (m && m[0] && m[0].textContent) return m[0].textContent.trim();\n      }\n      return \"\";\n    };\n    return nodes.map(el => {\n      const html = tag(el, [\"content:encoded\", \"content\", \"description\", \"summary\"]);\n      let image = \"\";\n      const enc = el.getElementsByTagName(\"enclosure\")[0];\n      if (enc && /image/i.test(enc.getAttribute(\"type\") || \"\")) image = enc.getAttribute(\"url\") || \"\";\n      if (!image) { const mc = el.getElementsByTagName(\"media:content\")[0] || el.getElementsByTagName(\"media:thumbnail\")[0]; if (mc) image = mc.getAttribute(\"url\") || \"\"; }\n      if (!image) image = this.imgFrom(html);\n      let link = tag(el, [\"link\"]);\n      if (!link) { const la = el.getElementsByTagName(\"link\")[0]; if (la) link = la.getAttribute(\"href\") || \"\"; }\n      return this.normalize({\n        author: tag(el, [\"dc:creator\", \"author\"]) || \"Team AV\",\n        date: tag(el, [\"pubDate\", \"published\", \"updated\", \"dc:date\"]),\n        text: this.clean(html || tag(el, [\"title\"])),\n        image, url: link\n      });\n    });\n  }\n\n  // ---- Hjelpere ----\n  normalize(p) {\n    let text = (p.text || \"\");\n    let tags = Array.isArray(p.tags) ? p.tags.slice() : [];\n    // Hent ut hashtags (krever bokstav etter #, så \"#1\" o.l. ikke teller)\n    if (!tags.length) {\n      const m = text.match(/#[A-Za-zÆØÅæøå][\\wÆØÅæøå]*/g);\n      if (m) tags = [...new Set(m)].slice(0, 3);\n    }\n    // Fjern hengende hashtag-linjer på slutten (de vises som chips i stedet)\n    let lines = text.split(\"\\n\");\n    while (lines.length && /^(#[\\wÆØÅæøå]+\\s*)+$/.test(lines[lines.length - 1].trim())) lines.pop();\n    // Trim tomme linjer i start/slutt\n    while (lines.length && !lines[0].trim()) lines.shift();\n    while (lines.length && !lines[lines.length - 1].trim()) lines.pop();\n    text = lines.join(\"\\n\");\n    return {\n      author: p.author || \"Team AV\",\n      role: p.role || \"\",\n      date: p.date || \"\",\n      text,\n      image: p.image || \"\",\n      url: p.url || \"\",\n      tags\n    };\n  }\n  // Gjør LinkedIn-HTML om til ren tekst MED linjeskift og kulepunkter bevart\n  clean(html) {\n    if (!html) return \"\";\n    let s = String(html);\n    if (/[<&]/.test(s)) {\n      s = s.replace(/<br\\s*\\/?>/gi, \"\\n\")\n           .replace(/<\\/(p|div|li|h[1-6]|tr)>/gi, \"\\n\")\n           .replace(/<li[^>]*>/gi, \"• \")\n           .replace(/<[^>]+>/g, \"\");\n      try { const d = new DOMParser().parseFromString(s, \"text/html\"); s = d.body.textContent || s; } catch (e) {}\n    }\n    // Rens hver linje, men behold linjeskiftene; maks én tom linje mellom avsnitt\n    s = s.split(\"\\n\").map(l => l.replace(/[ \\t\\u00a0]+/g, \" \").trim()).join(\"\\n\").replace(/\\n{3,}/g, \"\\n\\n\").trim();\n    return s;\n  }\n  imgFrom(html) {\n    if (!html || !/<img/i.test(html)) return \"\";\n    const m = html.match(/<img[^>]+src=[\"']([^\"']+)[\"']/i);\n    return m ? m[1] : \"\";\n  }\n\n  applyAccent() {\n    const a = this.props.accent;\n    if (a) document.documentElement.style.setProperty(\"--accent\", a);\n  }\n\n  startRotation() {\n    clearInterval(this.rotTimer);\n    const secs = Math.max(4, Number(this.props.rotationSeconds) || 10);\n    this.rotTimer = setInterval(() => {\n      const n = (this.state.posts.length || this.DEFAULTS.length);\n      this.setState(s => ({ index: (s.index + 1) % n }));\n    }, secs * 1000);\n  }\n\n  tickClock() {\n    const now = new Date();\n    const timeStr = now.toLocaleTimeString(\"nb-NO\", { hour: \"2-digit\", minute: \"2-digit\" });\n    if (timeStr === this.state.timeStr) return;\n    let dateStr = now.toLocaleDateString(\"nb-NO\", { weekday: \"long\", day: \"numeric\", month: \"long\" });\n    dateStr = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);\n    this.setState({ timeStr, dateStr });\n  }\n\n  initials(name) {\n    return (name || \"\").trim().split(/\\s+/).slice(0, 2).map(w => w[0] || \"\").join(\"\").toUpperCase() || \"AV\";\n  }\n  fmtDate(iso) {\n    const d = new Date(iso);\n    if (isNaN(d)) return iso || \"\";\n    return d.toLocaleDateString(\"nb-NO\", { day: \"numeric\", month: \"long\", year: \"numeric\" });\n  }\n  view(p, key) {\n    const img = (p.image && String(p.image).trim()) || \"\";\n    const has = !!img;\n    const isVideo = /videocover|\\/video|video_/i.test(img);\n    const tags = Array.isArray(p.tags) ? p.tags : [];\n    const role = p.role || \"\";\n    const dateLabel = this.fmtDate(p.date);\n    const esc = img.replace(/\"/g, \"%22\");\n    return {\n      key: String(key),\n      author: p.author || \"Team AV\",\n      role,\n      dateLabel,\n      meta: role ? (role + \" · \" + dateLabel) : dateLabel,\n      text: p.text || \"\",\n      tags,\n      tagsLine: tags.join(\"  \"),\n      hasImage: has,\n      noImage: !has,\n      isVideo,\n      badge: isVideo ? \"Video\" : \"LinkedIn\",\n      image: img,\n      // Uskarp bakgrunnsfyll så ingen tomme felter ved stående/dokument-bilder\n      imageFillStyle: has ? ('position:absolute;inset:0;background-image:url(\"' + esc + '\");background-size:cover;background-position:center;filter:blur(26px) brightness(.5);transform:scale(1.18);z-index:1;') : \"\",\n      // Hele bildet vises uten beskjæring\n      imageMainStyle: has ? ('position:absolute;inset:0;background-image:url(\"' + esc + '\");background-size:contain;background-repeat:no-repeat;background-position:center;z-index:2;') : \"\",\n      initials: this.initials(p.author),\n    };\n  }\n\n  renderVals() {\n    const posts = this.state.posts.length ? this.state.posts : this.DEFAULTS;\n    const n = posts.length;\n    const idx = n ? this.state.index % n : 0;\n    const layout = this.props.layout || \"spotlight\";\n    const accent = this.props.accent || \"#2BC8DE\";\n\n    const cur = this.view(posts[idx], idx);\n    const gridPosts = posts.slice(0, 6).map((p, i) => this.view(p, i));\n    const tickerView = posts.map((p, i) => this.view(p, \"t\" + i));\n    const tickerList = tickerView.concat(tickerView.map(v => ({ ...v, key: v.key + \"x\" })));\n\n    const dotBase = \"border-radius:999px;transition:all .45s ease;display:block;height:clamp(8px,1vmin,12px);\";\n    const dots = posts.map((_, i) => ({\n      style: i === idx\n        ? dotBase + \"width:clamp(22px,2.8vmin,36px);background:var(--accent);\"\n        : dotBase + \"width:clamp(8px,1vmin,12px);background:rgba(255,255,255,.2);\",\n    }));\n\n    return {\n      timeStr: this.state.timeStr,\n      dateStr: this.state.dateStr,\n      isSpotlight: layout === \"spotlight\",\n      isGrid: layout === \"grid\",\n      isTicker: layout === \"ticker\",\n      cur, gridPosts, tickerList, dots, accent,\n      pageUrl: this.state.page.url,\n      pageName: this.state.page.name,\n      qrImg: this.state.qrDataUrl\n        ? React.createElement(\"img\", { src: this.state.qrDataUrl, alt: \"QR-kode til LinkedIn\", style: { width: \"100%\", height: \"100%\", imageRendering: \"pixelated\", display: \"block\" } })\n        : null,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
